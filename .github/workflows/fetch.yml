name: Fetch Market Data

on:
  schedule:
    - cron: "30 21 * * 1-5"       # 4:30 PM ET (21:30 UTC), Monday–Friday
  workflow_dispatch:            # Manual trigger

permissions:
  contents: write               # Required to commit data updates back to repo

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install yfinance requests pandas

      - name: Run Fetch Script
        run: python scripts/fetch_data.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Commit and push updated data JSONs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/output/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update market data $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git pull --rebase origin main && git push)
